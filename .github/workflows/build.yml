# Build firmware on push/PR; upload binaries as a short-lived artifact.
name: Build

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

concurrency:
  group: build-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  firmware:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache PlatformIO
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pip
            ~/.platformio/.cache
            .pio/libdeps
          key: ${{ runner.os }}-pio-${{ hashFiles('platformio.ini') }}
          restore-keys: |
            ${{ runner.os }}-pio-

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install PlatformIO
        run: pip install --upgrade platformio

      - name: Check airport data
        run: python3 scripts/build_large_airports.py --check

      - name: Build
        run: pio run -e supermini

      - name: Merge web-flash image
        run: pio run -t merge -e supermini

      - name: Upload firmware artifacts
        uses: actions/upload-artifact@v4
        with:
          name: plane-radar-supermini
          if-no-files-found: error
          path: |
            .pio/build/supermini/firmware-merged.bin
            .pio/build/supermini/firmware.bin
            .pio/build/supermini/bootloader.bin
            .pio/build/supermini/partitions.bin
